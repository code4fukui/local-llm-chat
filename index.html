<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local LLM Chat</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Local LLM Chat</h1>
            <p>Gemma / WebGPU / IndexedDB</p>
          </div>
          <span id="webgpuBadge" class="badge">checking</span>
        </div>

        <section class="panel">
          <h2>Model</h2>
          <label>
            Preset
            <select id="presetSelect">
              <option value="qwen4b">Qwen3 4B WebLLM</option>
              <option value="gemma">Gemma 3 1B verified</option>
              <option value="llama-small">WebLLM test model</option>
              <option value="gemma4b">Gemma 3 4B needs WASM</option>
              <option value="custom">Custom MLC model</option>
            </select>
          </label>
          <label>
            Model ID
            <input id="modelIdInput" autocomplete="off" />
          </label>
          <label>
            Model URL
            <input id="modelUrlInput" autocomplete="off" />
          </label>
          <label>
            WebGPU WASM
            <input id="modelLibInput" autocomplete="off" />
          </label>
          <div class="settings-grid">
            <label>
              Context
              <input id="contextInput" type="number" min="512" max="131072" step="512" />
            </label>
            <label>
              Max tokens
              <input id="maxTokensInput" type="number" min="16" max="4096" step="16" />
            </label>
            <label>
              Temp
              <input id="temperatureInput" type="number" min="0" max="2" step="0.1" />
            </label>
            <label>
              Top P
              <input id="topPInput" type="number" min="0.05" max="1" step="0.05" />
            </label>
          </div>
          <div class="button-row">
            <button id="loadButton" class="primary">Load</button>
            <button id="clearButton">Clear chat</button>
            <button id="clearIndexedDbButton" type="button">Clear IndexedDB</button>
          </div>
        </section>

        <section class="panel status-panel">
          <h2>Status</h2>
          <div class="meter">
            <span id="progressBar"></span>
          </div>
          <p id="statusText">Ready</p>
          <dl>
            <div>
              <dt>Backend</dt>
              <dd>WebGPU</dd>
            </div>
            <div>
              <dt>Model cache</dt>
              <dd>IndexedDB</dd>
            </div>
            <div>
              <dt>Chat log</dt>
              <dd>IndexedDB</dd>
            </div>
          </dl>
        </section>
      </aside>

      <section class="chat">
        <div id="messages" class="messages" aria-live="polite"></div>
        <form id="chatForm" class="composer">
          <textarea id="promptInput" rows="1" placeholder="メッセージを入力" disabled></textarea>
          <button id="sendButton" class="primary" disabled>Send</button>
          <button id="stopButton" type="button" disabled>Stop</button>
        </form>
      </section>
    </main>

    <script type="module" src="./bundle.js"></script>
  </body>
</html>
