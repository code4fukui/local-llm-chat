<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 三択クイズ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f8;
        --surface: #ffffff;
        --surface-2: #edf2f4;
        --line: #d7dee2;
        --text: #202629;
        --muted: #66747a;
        --accent: #176b61;
        --accent-2: #b75037;
        --good: #177245;
        --bad: #a13a31;
        --shadow: 0 16px 44px rgba(31, 42, 46, 0.1);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(23, 107, 97, 0.08), transparent 44%),
          var(--bg);
        color: var(--text);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 0 14px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
        min-height: 100vh;
        min-height: 100dvh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
        padding: 18px;
      }

      .brand {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 23px;
        line-height: 1.14;
      }

      .brand p,
      .panel p,
      label {
        color: var(--muted);
        font-size: 13px;
      }

      .brand p {
        margin-top: 6px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--muted);
        padding: 0 10px;
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.ok {
        background: rgba(23, 114, 69, 0.12);
        color: var(--good);
      }

      .badge.bad {
        background: rgba(161, 58, 49, 0.12);
        color: var(--bad);
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 14px;
      }

      .panel h2 {
        margin-bottom: 12px;
        font-size: 15px;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-weight: 650;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfd;
        color: var(--text);
        padding: 10px 11px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(23, 107, 97, 0.14);
      }

      .topic-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .topic-option {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfd;
        padding: 8px 10px;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
      }

      .topic-option input {
        width: auto;
        margin: 0;
      }

      .button-row {
        display: flex;
        gap: 10px;
      }

      .button-row button {
        flex: 1;
      }

      .meter {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--surface-2);
      }

      .meter span {
        display: block;
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 160ms ease;
      }

      #statusText {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .quiz {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 28px;
      }

      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .quiz-header h2 {
        font-size: 18px;
      }

      .score {
        display: flex;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .question-card {
        width: min(860px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      #question {
        font-size: 22px;
        font-weight: 780;
        line-height: 1.45;
      }

      .choices {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }

      .choice {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
        width: 100%;
        min-height: 56px;
        padding: 10px 12px;
        text-align: left;
      }

      .choice .mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--muted);
        font-weight: 800;
      }

      .choice.correct {
        border-color: rgba(23, 114, 69, 0.45);
        background: rgba(23, 114, 69, 0.08);
      }

      .choice.wrong {
        border-color: rgba(161, 58, 49, 0.45);
        background: rgba(161, 58, 49, 0.08);
      }

      .comment {
        width: min(860px, 100%);
        min-height: 92px;
        border-left: 4px solid var(--accent);
        background: rgba(255, 255, 255, 0.72);
        padding: 14px 16px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .empty {
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .quiz {
          padding: 18px;
        }

        .quiz-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>AI 三択クイズ</h1>
            <p>Qwen3 4B / WebGPU / IndexedDB</p>
          </div>
          <span id="webgpuBadge" class="badge">checking</span>
        </div>

        <section class="panel">
          <h2>Model</h2>
          <label>
            Model ID
            <input id="modelIdInput" value="Qwen3-4B-q4f16_1-MLC" autocomplete="off" />
          </label>
          <h2>Topic</h2>
          <div class="topic-grid" aria-label="Topic">
            <label class="topic-option">
              <input type="checkbox" name="topic" value="日本の地理" checked />
              日本の地理
            </label>
            <label class="topic-option">
              <input type="checkbox" name="topic" value="日本の歴史" checked />
              日本の歴史
            </label>
            <label class="topic-option">
              <input type="checkbox" name="topic" value="科学" checked />
              科学
            </label>
            <label class="topic-option">
              <input type="checkbox" name="topic" value="文学" />
              文学
            </label>
            <label class="topic-option">
              <input type="checkbox" name="topic" value="スポーツ" />
              スポーツ
            </label>
            <label class="topic-option">
              <input type="checkbox" name="topic" value="IT" />
              IT
            </label>
          </div>
          <div class="button-row">
            <button id="loadButton">Load</button>
            <button id="newButton" class="primary">出題</button>
            <button id="clearIndexedDbButton" type="button">Clear IndexedDB</button>
          </div>
        </section>

        <section class="panel">
          <h2>Status</h2>
          <div class="meter"><span id="progressBar"></span></div>
          <p id="statusText">Ready</p>
        </section>
      </aside>

      <section class="quiz">
        <div class="quiz-header">
          <h2>三択問題</h2>
          <div class="score">
            <span>正解 <strong id="correctCount">0</strong></span>
            <span>回答 <strong id="answeredCount">0</strong></span>
          </div>
        </div>

        <article class="question-card">
          <p id="question" class="empty">「出題」を押すとモデルを読み込んで問題を作ります。</p>
          <div id="choices" class="choices"></div>
        </article>

        <div id="comment" class="comment empty">回答するとAIのコメントが表示されます。</div>
      </section>
    </main>

    <script type="module">
      import * as webllm from "https://esm.run/@mlc-ai/web-llm";

      const els = {
        webgpuBadge: document.querySelector("#webgpuBadge"),
        modelIdInput: document.querySelector("#modelIdInput"),
        topicInputs: [...document.querySelectorAll('input[name="topic"]')],
        loadButton: document.querySelector("#loadButton"),
        newButton: document.querySelector("#newButton"),
        clearIndexedDbButton: document.querySelector("#clearIndexedDbButton"),
        progressBar: document.querySelector("#progressBar"),
        statusText: document.querySelector("#statusText"),
        question: document.querySelector("#question"),
        choices: document.querySelector("#choices"),
        comment: document.querySelector("#comment"),
        correctCount: document.querySelector("#correctCount"),
        answeredCount: document.querySelector("#answeredCount"),
      };

      let engine;
      let loadedModelId = "";
      let currentQuiz;
      let busy = false;
      let correctCount = 0;
      let answeredCount = 0;
      const MAX_TOKENS = 2048;
      const INDEXED_DB_NAMES = [
        "local-llm-chat",
        "webllm/config",
        "webllm/wasm",
        "webllm/model",
      ];

      init();

      async function init() {
        await checkWebGpu();
        els.loadButton.addEventListener("click", () => {
          loadModel(true).catch(() => {});
        });
        els.newButton.addEventListener("click", generateQuiz);
        els.clearIndexedDbButton.addEventListener("click", clearIndexedDbData);
      }

      async function checkWebGpu() {
        if (!("gpu" in navigator)) {
          setBadge("no WebGPU", "bad");
          return;
        }
        const adapter = await navigator.gpu.requestAdapter();
        setBadge(adapter ? "WebGPU ready" : "no adapter", adapter ? "ok" : "bad");
      }

      async function loadModel(force = false) {
        const modelId = els.modelIdInput.value.trim();
        if (!modelId) {
          throw new Error("Model ID is required.");
        }
        if (!force && engine && loadedModelId === modelId) return;

        setBusy(true);
        setStatus("Loading model", 0.02);
        try {
          engine?.unload?.();
          engine = await webllm.CreateMLCEngine(
            modelId,
            {
              appConfig: {
                ...webllm.prebuiltAppConfig,
                cacheBackend: "indexeddb",
              },
              initProgressCallback: (progress) => {
                setStatus(progress.text ?? "Loading model", progress.progress ?? 0);
              },
              logLevel: "INFO",
            },
            {
              context_window_size: 4096,
              sliding_window_size: -1,
            },
          );
          loadedModelId = modelId;
          setStatus("Model loaded from WebLLM cache or network", 1);
        } catch (error) {
          loadedModelId = "";
          setStatus(error.message, 0);
          throw error;
        } finally {
          setBusy(false);
        }
      }

      async function generateQuiz() {
        if (busy) return;

        currentQuiz = null;
        els.question.textContent = engine ? "出題中..." : "モデルを読み込んでいます...";
        els.question.className = "";
        els.choices.innerHTML = "";
        setComment(engine ? "AIが三択問題を作っています。" : "初回はモデル読込に時間がかかります。", true);

        try {
          await loadModel();
          setBusy(true);
          els.question.textContent = "出題中...";
          setComment("AIが三択問題を作っています。", true);
          const topic = selectedTopics();
          const content = await complete([
            {
              role: "system",
              content:
                "あなたは日本語の三択クイズ作家です。必ずJSONだけを返してください。Markdownや説明文は禁止です。",
            },
            {
              role: "user",
              content:
                `テーマ: ${topic}\n` +
                "新しい三択問題を1問作ってください。形式は " +
                '{"question":"問題文","choices":["選択肢A","選択肢B","選択肢C"],"answer":0,"explanation":"正解の短い理由"} ' +
                "です。answerは0,1,2のどれかです。",
            },
          ], MAX_TOKENS, 0.85);
          currentQuiz = parseQuiz(content);
          renderQuiz(currentQuiz);
          setComment("選択肢を1つ選んでください。", true);
          setStatus("Question ready", 1);
        } catch (error) {
          els.question.textContent = "問題を作れませんでした。もう一度「出題」を押してください。";
          els.question.className = "empty";
          setComment(error.message, true);
          setStatus(error.message, 0);
        } finally {
          setBusy(false);
        }
      }

      async function answerQuiz(index) {
        if (!currentQuiz || currentQuiz.answered || busy) return;

        currentQuiz.answered = true;
        const isCorrect = index === currentQuiz.answer;
        answeredCount += 1;
        if (isCorrect) correctCount += 1;
        updateScore();
        markChoices(index);
        setComment("AIがコメントを書いています。", true);
        setBusy(true);

        try {
          const comment = await complete([
            {
              role: "system",
              content:
                "あなたは三択クイズの司会者です。正解でも不正解でも、自然で短い日本語コメントを返してください。",
            },
            {
              role: "user",
              content:
                `問題: ${currentQuiz.question}\n` +
                `選択肢: ${currentQuiz.choices.join(" / ")}\n` +
                `ユーザーの回答: ${currentQuiz.choices[index]}\n` +
                `正解: ${currentQuiz.choices[currentQuiz.answer]}\n` +
                `判定: ${isCorrect ? "正解" : "不正解"}\n` +
                `補足: ${currentQuiz.explanation || ""}\n` +
                "80字以内でコメントしてください。",
            },
          ], MAX_TOKENS, 0.75);
          setComment(comment.trim() || (isCorrect ? "正解です。" : "不正解です。"));
          setStatus(isCorrect ? "Correct" : "Incorrect", 1);
        } catch (error) {
          setComment(
            `${isCorrect ? "正解" : "不正解"}です。正解は「${currentQuiz.choices[currentQuiz.answer]}」。${currentQuiz.explanation || ""}`,
          );
          setStatus(error.message, 0);
        } finally {
          setBusy(false);
        }
      }

      async function complete(messages, maxTokens, temperature) {
        console.log("[ai request]", {
          messages,
          max_tokens: maxTokens,
          temperature,
          top_p: 0.9,
        });
        const response = await engine.chat.completions.create({
          messages,
          stream: false,
          max_tokens: maxTokens,
          temperature,
          top_p: 0.9,
        });
        const content = response.choices?.[0]?.message?.content ?? "";
        console.log("[ai response]", response);
        console.log("[ai response content]", content);
        return removeThinkBlocks(content);
      }

      function removeThinkBlocks(text) {
        return text.replace(/<think>([\s\S]*?)<\/think>/gi, (_, thinking) => {
          console.log("[think]", thinking.trim());
          return "";
        }).trim();
      }

      function parseQuiz(text) {
        const jsonText = text.slice(text.indexOf("{"), text.lastIndexOf("}") + 1);
        const data = JSON.parse(jsonText);
        if (
          typeof data.question !== "string" ||
          !Array.isArray(data.choices) ||
          data.choices.length !== 3 ||
          !Number.isInteger(data.answer) ||
          data.answer < 0 ||
          data.answer > 2
        ) {
          throw new Error("AI response was not a valid three-choice quiz.");
        }
        return {
          question: data.question,
          choices: data.choices.map((choice) => String(choice)),
          answer: data.answer,
          explanation: String(data.explanation ?? ""),
          answered: false,
        };
      }

      function renderQuiz(quiz) {
        els.question.textContent = quiz.question;
        els.question.className = "";
        els.choices.innerHTML = "";
        quiz.choices.forEach((choice, index) => {
          const button = document.createElement("button");
          button.className = "choice";
          button.type = "button";
          button.innerHTML = '<span class="mark"></span><span class="label"></span>';
          button.querySelector(".mark").textContent = ["A", "B", "C"][index];
          button.querySelector(".label").textContent = choice;
          button.addEventListener("click", () => answerQuiz(index));
          els.choices.append(button);
        });
      }

      function markChoices(selectedIndex) {
        [...els.choices.children].forEach((button, index) => {
          button.disabled = true;
          if (index === currentQuiz.answer) button.classList.add("correct");
          if (index === selectedIndex && index !== currentQuiz.answer) {
            button.classList.add("wrong");
          }
        });
      }

      function setBusy(isBusy) {
        busy = isBusy;
        els.loadButton.disabled = isBusy;
        els.newButton.disabled = isBusy;
        els.clearIndexedDbButton.disabled = isBusy;
      }

      function setStatus(text, progress) {
        els.statusText.textContent = text;
        els.progressBar.style.width = `${Math.max(0, Math.min(1, progress)) * 100}%`;
      }

      function setBadge(text, type) {
        els.webgpuBadge.textContent = text;
        els.webgpuBadge.className = `badge ${type}`;
      }

      function setComment(text, muted = false) {
        els.comment.textContent = text;
        els.comment.className = muted ? "comment empty" : "comment";
      }

      function updateScore() {
        els.correctCount.textContent = correctCount;
        els.answeredCount.textContent = answeredCount;
      }

      function selectedTopics() {
        const topics = els.topicInputs
          .filter((input) => input.checked)
          .map((input) => input.value);
        return topics.length ? topics.join("、") : "一般教養";
      }

      async function clearIndexedDbData() {
        const confirmed = confirm(
          "IndexedDB のモデルキャッシュなど、このオリジンのアプリデータを削除します。よろしいですか？",
        );
        if (!confirmed || busy) return;

        setBusy(true);
        setStatus("Clearing IndexedDB", 0.1);

        try {
          engine?.unload?.();
          engine = null;
          loadedModelId = "";
          currentQuiz = null;
          correctCount = 0;
          answeredCount = 0;
          updateScore();
          await Promise.all(INDEXED_DB_NAMES.map((dbName) => deleteDatabase(dbName)));
          els.question.textContent = "「出題」を押すとモデルを読み込んで問題を作ります。";
          els.question.className = "empty";
          els.choices.innerHTML = "";
          setComment("IndexedDBを削除しました。次回出題時にモデルを読み込み直します。", true);
          setStatus("IndexedDB cleared", 1);
        } catch (error) {
          setStatus(
            `Failed to clear IndexedDB: ${error.message}. Close other tabs using this app and try again.`,
            0,
          );
          setComment(error.message, true);
        } finally {
          setBusy(false);
        }
      }

      function deleteDatabase(dbName) {
        return new Promise((resolve, reject) => {
          const request = indexedDB.deleteDatabase(dbName);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
          request.onblocked = () =>
            reject(new Error(`Database "${dbName}" is blocked by an open connection`));
        });
      }
    </script>
  </body>
</html>
